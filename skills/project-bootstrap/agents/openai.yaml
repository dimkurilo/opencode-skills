display_name: Project Bootstrap
short_description: >
  Создаёт агентскую инфраструктуру (.agents/, AGENTS.md, memory, rules, skills, scripts)
  для нового проекта. Анализирует задачу, ищет информацию в интернете, генерирует структуру
  по стандарту Agent Playbook.
default_prompt: |
  Прочитай описание задачи пользователя. Проанализируй: какие внешние инструменты упоминаются,
  какие CLI-тулы нужны, какие локальные проекты можно переиспользовать. Найди актуальную
  информацию через webfetch. Определи структуру .agents/: нужны ли agents, commands, skills,
  scripts. Создай AGENTS.md, memory/MEMORY.md, rules/general.md и дополнительные модули
  по необходимости. Проверь все созданные файлы. Выведи сводку.
